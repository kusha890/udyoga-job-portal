<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udyoga Maya | Professional Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --charcoal: #080808; 
            --matte-gold: #c5a059; 
            --paper-white: #f8fafc; 
        }
        
        body { 
            background-color: var(--charcoal); 
            color: var(--paper-white); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            min-height: 100vh;
        }
        
       
        .navbar-custom { 
            background-color: #111; 
            border-bottom: 1px solid #222; 
            padding: 15px 0; 
        }
        
        .brand-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none !important; 
        }
        
        .logo-svg { 
            width: 40px; 
            height: 40px; 
        }
        
        .brand-main { 
            color: var(--paper-white); 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 800; 
            font-size: 22px; 
            letter-spacing: 1px; 
        }
        
        .brand-sub { 
            color: var(--matte-gold); 
            font-size: 10px; 
            letter-spacing: 4px; 
            font-weight: 600; 
            text-transform: uppercase; 
        }
        
        .nav-link-custom { 
            color: var(--paper-white) !important; 
            font-weight: 600; 
            margin-left: 20px; 
            text-decoration: none; 
            transition: 0.3s; 
            background: none; 
            border: none; 
            padding: 0; 
            cursor: pointer;
        }
        
        .nav-link-custom:hover { 
            color: var(--matte-gold) !important; 
        }
        
        .btn-gold { 
            background-color: var(--matte-gold); 
            color: #000 !important; 
            font-weight: 700; 
            border-radius: 8px; 
            padding: 8px 20px; 
            border: none; 
            text-decoration: none; 
            transition: 0.3s;
        }

        .btn-gold:hover {
            background-color: #e2ba6e;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <nav class="navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="brand-wrapper">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M25 35 V55 C25 68 35 75 50 75 C65 75 75 68 75 55 V35 M50 75 V45 C50 35 68 35 75 45" 
                          stroke="#c5a059" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="75" cy="35" r="5" fill="#f8fafc"/>
                </svg>
                <div class="d-flex flex-column" style="line-height: 1;">
                    <span class="brand-main">UDYOGA</span>
                    <span class="brand-sub">MAYA</span>
                </div>
            </a>

            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <a href="/" class="nav-link-custom">Home</a>
                    <a href="/dashboard" class="nav-link-custom">Dashboard</a>
                    <a href="/rate-experience" class="nav-link-custom">Rate Us</a>
                    
                    <form action="{% url 'logout' %}" method="POST" style="display: inline; margin-left: 20px;">
                        {% csrf_token %}
                        <button type="submit" class="nav-link-custom">Logout</button>
                    </form>
                {% else %}
                    <a href="/login" class="nav-link-custom">Login</a>
                    <a href="/register" class="btn-gold ms-4">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
