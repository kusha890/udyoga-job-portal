<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background-color: #111; border: 1px solid #c5a059; border-radius: 15px; overflow: hidden;">
        <div style="background-color: #c5a059; padding: 20px; text-align: center;">
            <h1 style="color: #000; margin: 0; text-transform: uppercase; letter-spacing: 2px;">Udyoga Maya</h1>
        </div>
        
        <div style="padding: 30px; line-height: 1.6;">
            <h2 style="color: #c5a059;">{{ title }}</h2>
            <p style="color: #ccc; font-size: 16px;">{{ body_text }}</p>
            
            {% if action_url %}
            <div style="text-align: center; margin-top: 30px;">
                <a href="{{ action_url }}" style="background-color: #c5a059; color: #000; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; text-transform: uppercase;">
                    {{ button_text }}
                </a>
            </div>
            {% endif %}
        </div>
        
        <div style="background-color: #1a1a1a; padding: 15px; text-align: center; font-size: 12px; color: #666;">
            <p>&copy; 2026 Udyoga Maya Recruitment Portal. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
