{% extends 'base.html' %}
{% block content %}
<div class="reset-container">
    <div class="reset-card">
        <div style="color: #28a745; font-size: 50px; margin-bottom: 20px;">✅</div>
        <h2>Password Set!</h2>
        <p>Your password has been successfully updated. You may now log in with your new credentials.</p>
        <a href="{% url 'login' %}" class="btn-gold" style="text-decoration: none; display: block; margin-top: 20px;">Go to Login</a>
    </div>
</div>
{% endblock %}
