{% extends 'base.html' %}
{% block content %}
<style>
    .reset-container { min-height: 90vh; display: flex; align-items: center; justify-content: center; background: #0a0a0a; }
    .reset-card { background: #111; border: 1px solid #222; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .reset-card h2 { color: #fff; margin-bottom: 10px; }
    .reset-card p { color: #666; font-size: 14px; margin-bottom: 25px; }
    .input-box { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; }
    .btn-gold { background: #c5a059; color: #000; width: 100%; padding: 15px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
</style>

<div class="reset-container">
    <div class="reset-card">
        <h2>Reset Password</h2>
        <p>Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" class="input-box" placeholder="Enter your registered email" required>
            <button type="submit" class="btn-gold">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
