{% extends 'base.html' %}
{% block content %}

<style>
    .auth-container {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .register-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 24px;
        width: 100%;
        max-width: 600px; /* Wider for profile fields */
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .register-header {
        background: #1a1a1a;
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #222;
    }

    .register-header h2 {
        color: #f8fafc;
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.5px;
    }

    .register-header p {
        color: #c5a059;
        font-size: 14px;
        margin-top: 5px;
        font-weight: 500;
    }

    .register-body {
        padding: 40px;
    }

    .form-label {
        display: block;
        color: #f8fafc;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin-bottom: 8px;
    }

    .form-control-custom {
        width: 100%;
        background: #1a1a1a !important;
        border: 1px solid #333 !important;
        color: #f8fafc !important;
        padding: 12px 16px;
        border-radius: 10px;
        outline: none;
        transition: 0.3s;
        margin-bottom: 20px;
    }

    .form-control-custom:focus {
        border-color: #c5a059 !important;
        box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1);
    }

    .btn-register {
        width: 100%;
        background: #c5a059 !important;
        color: #000 !important;
        font-weight: 800;
        padding: 14px;
        border-radius: 12px;
        border: none;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-register:hover {
        background: #e2ba6e !important;
        transform: translateY(-2px);
    }

    .register-footer {
        text-align: center;
        margin-top: 25px;
        color: #666;
        font-size: 14px;
    }

    .register-footer a {
        color: #c5a059;
        text-decoration: none;
        font-weight: 700;
    }

   
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
</style>

<div class="auth-container">
    <div class="register-card">
        
        <div class="register-header">
            <h2>Create Account</h2>
            <p>Join the Udyoga Maya Recruitment Network</p>
        </div>

        <div class="register-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control-custom" placeholder="Choose a unique username" required>

                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control-custom" placeholder="student@university.edu" required>

                <div class="form-row">
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" name="password1" class="form-control-custom" placeholder="••••••••" required>
                    </div>
                    <div>
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password2" class="form-control-custom" placeholder="••••••••" required>
                    </div>
                </div>

                <hr style="border-color: #222; margin-bottom: 25px;">
                <p style="color: #c5a059; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px;">Profile Information</p>

                <div class="form-row">
                    <div>
                        <label class="form-label">Current CGPA</label>
                        <input type="number" step="0.01" name="cgpa" class="form-control-custom" placeholder="e.g. 8.5" required>
                    </div>
                    <div>
                        <label class="form-label">Branch / Discipline</label>
                        <input type="text" name="branch" class="form-control-custom" placeholder="e.g. Computer Science" required>
                    </div>
                </div>

                <label class="form-label">Key Skills</label>
                <textarea name="skills" rows="2" class="form-control-custom" placeholder="Python, Django, SQL, etc."></textarea>

                <label class="form-label">Resume (PDF Version)</label>
                <input type="file" name="resume" class="form-control-custom" style="padding: 8px;">

                <button type="submit" class="btn-register">Complete Registration</button>
            </form>

            <div class="register-footer">
                Already part of the network? <a href="{% url 'login' %}">Login Here</a>
            </div>
        </div>

    </div>
</div>

{% endblock %}
